<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>

    <!-- *LINK PARA CSS -->
    <link rel="stylesheet" href="sidebar.css">

    <!-- *ÍCONES -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body>
    <main id=sidebar>
        <img class="logo-principal-deep-groove" src="../../../public/assets/logo-principal-deep-groove.png">
        <ul class="navegar-para-paginas-administrativas">
            <li class="pagina-inicial">
                <i class="icone-pagina-inicial bi bi-house-door"></i>
                Home
            </li>
            <li class="pagina-lista-de-usuarios">
                <i class="icone-pagina-lista-de-usuarios bi bi-person-square"></i>
                Usuários
            </li>
            <li class="pagina-dashboard">
                <i class="icone-pagina-dashboard bi bi-house-door"></i>
                Dashboard
            </li>
            <li class="pagina-tabela-de-publicacoes">
                <i class="icone-pagina-tabela-de-publicacoes bi bi-window-stack"></i>
                Publicações
            </li>
        </ul>
        <button class="botao-sign-out">
            <i class="icone-sign-out bi bi-box-arrow-left"></i>
            Sign out
        </button>
    </main>
</body>
</html>
