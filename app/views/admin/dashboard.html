<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Deep Groove</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../../../public/css/dashboard.css">
    <!-- FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- ICONES -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"> 
</head>
<body>
    <div id="dashboard">
        <header id="cabecalho">
            <h1>Dashboard</h1>
            <div class="container-perfil">
                <div class="dados-do-administrador">
                    <p>Nome do administrador</p>
                    <p>Administrador</p>
                </div>
                <button class="icone-perfil">
                    <i class="bi bi-person-check"></i>
                </button>
            </div>
        </header>
        <section id="dados-usuarios-publicacoes">
            <p class="numero-de-usuarios-publicacoes numero-de-usuarios">Total de usuários: <span>X</span></p>
            <p class="numero-de-usuarios-publicacoes numero-de-publicacoes">Total de publicações: <span>Y</span></p>
        </section>  
        <main id="navegar-para-paginas-administrativas">
            <div class="container-lista-tabela container-lista-de-usuarios">
                <div class="container-texto-lista-tabela container-texto-lista-de-usuarios">
                    <h2>Lista de Usuários</h2>
                    <p>Gerencie os usuários do sistema</p>
                </div>
                <button class="icone-lista-tabela icone-lista-de-usuarios">
                    <i class="bi bi-person-lines-fill"></i>
                </button>
            </div>
            <div class="container-lista-tabela container-tabela-de-publicacoes">
                <div class="container-texto-lista-tabela container-texto-tabela-de-publicacoes">
                    <h2>Tabela de Publicações</h2>
                    <p>Administre as publicações do sistema</p>
                </div>
                <button class="icone-lista-tabela icone-tabela-de-publicacoes">
                    <i class="bi bi-file-earmark-post-fill"></i>
                </button>
            </div>
        </main>
        <footer id="rodape">
            <button class="botao-sign-out">
                Sign out
                <i class="icone-sign-out bi bi-box-arrow-right"></i>
            </button>
        </footer>
    </div>
</body>
</html>
