<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../../public/css/login-e-cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container-login">
        <div class="metade-tela-login imagem-cadastro">
        </div>
        <div class="metade-tela-login formulario">
            <div class="container-titulo">
                <h1 class="titulo-login">Cadastro</h1>
            </div>
            <form class="container-form">
                <div class="container-inputs"></div>
                    <div class="container-elemento-input">
                        <h2>Nome:</h2>
                        <input placeholder="Digite seu nome">
                    </div>
                    <div class="container-elemento-input">
                        <h2>Email:</h2>
                        <input placeholder="Digite seu email">
                    </div>
                    <div class="container-elemento-input">
                        <h2>Senha:</h2>
                        <input placeholder="Digite sua senha">
                    </div>
                    <div class="container-botao">
                        <button class="botao-login">Cadastrar</button>
                    </div>

            </form>
            <div class="container-logo">
                <img class="logo-login" src="../../../public/assets/LogoTextoIcone (1).png">
            </div>
        </div>
    </div>
</body>
</html>
